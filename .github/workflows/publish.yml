name: Publish Library

on:
  push:
    tags:
      - '*'  # triggers on any version tag like 1.0.0

jobs:
  publish:
    runs-on: macos-latest  # macos is required for iOS/KMP builds

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_USERNAME: mallikarjunpatelsh
          GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}